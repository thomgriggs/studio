  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2cb9bca7-854a-4352-9902-a0fa2e79dda8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a9999ece-f577-4572-8563-0762f5b3099d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2cb9bca7-854a-4352-9902-a0fa2e79dda8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a9999ece-f577-4572-8563-0762f5b3099d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #eef1f1;\n  --color-surface: #e1e6e6;\n  --color-text: #1e2426;\n  --color-accent: #b3663a;\n  --color-accent-2: #5a6b73;\n  --color-divider: color-mix(in srgb, #1e2426 16%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f4f6f6;\n  --color-neutral-200: #e7ebeb;\n  --color-neutral-300: #d3d9da;\n  --color-neutral-400: #b3bcbe;\n  --color-neutral-500: #929da0;\n  --color-neutral-600: #737e81;\n  --color-neutral-700: #565f62;\n  --color-neutral-800: #3b4143;\n  --color-neutral-900: #24282a;\n\n  --color-accent-100: #f7ece6;\n  --color-accent-200: #edd2c2;\n  --color-accent-300: #dfae8f;\n  --color-accent-400: #cc8558;\n  --color-accent-500: #b3663a;\n  --color-accent-600: #8f4f2a;\n  --color-accent-700: #6c3b1f;\n  --color-accent-800: #4a2814;\n  --color-accent-900: #2f190c;\n\n  --color-accent-2-100: #eef1f3;\n  --color-accent-2-200: #dbe1e5;\n  --color-accent-2-300: #bcc7cd;\n  --color-accent-2-400: #95a6ae;\n  --color-accent-2-500: #74868f;\n  --color-accent-2-600: #5a6b73;\n  --color-accent-2-700: #434f55;\n  --color-accent-2-800: #2d363a;\n  --color-accent-2-900: #1b2124;\n\n  --font-heading: \"Playfair Display\", Georgia, serif;\n  --font-heading-weight: 600;\n  --font-body: \"Figtree\", system-ui, sans-serif;\n\n  --space-1: 4.4px;\n  --space-2: 8.8px;\n  --space-3: 13.2px;\n  --space-4: 17.6px;\n  --space-6: 26.4px;\n  --space-8: 35.2px;\n\n  --radius-sm: 8px;\n  --radius-md: 16px;\n  --radius-lg: 28px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #24282a 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #24282a 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #24282a 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.washed{filter:saturate(0.6) contrast(0.85) brightness(1.1) opacity(0.94)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n/* — rounded frame: everything softens, small controls go pill — */\n.card, .dialog { border-radius: calc(var(--radius-lg) * 1.15); }\n.btn, .tag, .seg, .input { border-radius: 999px; }\n.input { padding-inline: 14px; }\n\n<\u002Fstyle>\n  <style>\n    .mw-nav-links { display: flex; align-items: center; gap: 28px; }\n    .mw-grid-2 { display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px; align-items: center; }\n    .mw-services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n    .mw-steps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }\n    .mw-pricing-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }\n    .mw-faq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 40px; }\n    @media (max-width: 980px) {\n      .mw-nav-links { display: none; }\n      .mw-grid-2 { grid-template-columns: 1fr; gap: 32px; }\n      .mw-services-grid { grid-template-columns: 1fr; }\n      .mw-steps-grid { grid-template-columns: 1fr 1fr; }\n      .mw-pricing-grid { grid-template-columns: 1fr 1fr; }\n      .mw-faq-grid { grid-template-columns: 1fr; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:var(--color-bg);color:var(--color-text);min-height:100vh;\">\n\n  <!-- NAV -->\n  <header class=\"nav\" style=\"max-width:1240px;margin:0 auto;padding:22px 32px;\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin-right:auto;\">\n      <div style=\"width:36px;height:36px;border-radius:50%;background:var(--color-accent);display:flex;align-items:center;justify-content:center;flex:none;\">\n        <span style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-bg);\">m<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-family:var(--font-heading);font-size:20px;letter-spacing:-0.01em;\">mywear<span style=\"color:var(--color-accent);\">.house<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <nav class=\"mw-nav-links\">\n      <a href=\"#services\">Services<\u002Fa>\n      <a href=\"#how-it-works\">How it works<\u002Fa>\n      <a href=\"#pricing\">Pricing<\u002Fa>\n      <a href=\"#faq\">FAQ<\u002Fa>\n    <\u002Fnav>\n    <a href=\"#coverage\" class=\"btn btn-primary\" style=\"margin-left:24px;\">Check your address<\u002Fa>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section style=\"max-width:1240px;margin:0 auto;padding:36px 32px 88px;\">\n    <div class=\"mw-grid-2\">\n      <div>\n        <span class=\"tag tag-accent\" style=\"margin-bottom:18px;\">Managed digital wardrobe storage<\u002Fspan>\n        <h1 style=\"font-size:56px;line-height:1.08;margin:14px 0 20px;max-width:16ch;text-wrap:pretty;\">You don't just store your wardrobe. You still use it.<\u002Fh1>\n        <p style=\"font-size:17px;max-width:46ch;opacity:0.85;margin-bottom:28px;\">We pick up, press, photograph, and store your clothes in a climate-controlled facility — then hand you a digital closet so anything you own is one delivery away.<\u002Fp>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n          <a href=\"#coverage\" class=\"btn btn-primary\" style=\"padding:14px 26px;font-size:15px;\">Check your address<\u002Fa>\n          <a href=\"#how-it-works\" class=\"btn btn-secondary\" style=\"padding:14px 26px;font-size:15px;\">See how it works<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;width:100%;height:420px;border-radius:var(--radius-lg);overflow:hidden;\">\n          <img src=\"6cc6bebe-4b35-4a71-af20-fc5b6f210e37\" alt=\"Men's t-shirts hanging in a closet\" class=\"washed\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n          <span style=\"position:absolute;bottom:8px;left:10px;font-size:10px;color:rgba(255,255,255,0.85);text-shadow:0 1px 2px rgba(0,0,0,0.5);\">Photo by <a href=\"https://unsplash.com/@chasecharaba\" style=\"color:inherit;\">Chase Charaba<\u002Fa> on Unsplash<\u002Fspan>\n        <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MISSION -->\n  <section style=\"background:var(--color-surface);padding:64px 32px;\">\n    <div style=\"max-width:760px;margin:0 auto;text-align:center;\">\n      <h6 style=\"color:var(--color-accent-700);\">Our mission<\u002Fh6>\n      <h2 style=\"font-size:30px;margin-top:10px;text-wrap:pretty;\">Give people their space back — without asking them to give up their clothes.<\u002Fh2>\n      <p style=\"font-size:16px;opacity:0.8;margin-top:14px;\">Every garment we store stays cared for, catalogued, and photographed, so the relationship between what you own and where it lives never gets fuzzy.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SERVICES -->\n  <section id=\"services\" style=\"max-width:1240px;margin:0 auto;padding:88px 32px;\">\n    <h6 style=\"color:var(--color-accent-700);\">Services<\u002Fh6>\n    <h2 style=\"font-size:34px;margin:10px 0 40px;\">Three ways we take the weight off your closet.<\u002Fh2>\n    <div class=\"mw-services-grid\">\n      <div class=\"card elev-sm\" style=\"padding:28px;gap:14px;\">\n        <div style=\"width:44px;height:44px;border-radius:50%;background:var(--color-accent-100);display:flex;align-items:center;justify-content:center;\">\n          <span style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-accent-700);\">01<\u002Fspan>\n        <\u002Fdiv>\n        <h3 class=\"card-title\" style=\"font-size:20px;\">Warehouse<\u002Fh3>\n        <p class=\"card-body\">Climate-controlled, moisture-free storage built for garments — not boxes. Every item is held at conditions that protect fabric, leather, and color over time.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card elev-sm\" style=\"padding:28px;gap:14px;\">\n        <div style=\"width:44px;height:44px;border-radius:50%;background:var(--color-accent-2-100);display:flex;align-items:center;justify-content:center;\">\n          <span style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-accent-2-700);\">02<\u002Fspan>\n        <\u002Fdiv>\n        <h3 class=\"card-title\" style=\"font-size:20px;\">Closets<\u002Fh3>\n        <p class=\"card-body\">Every piece gets the same hanger and garment bag, an intake date, a check-out count, and tags for brand, color, type and season — so nothing is ever a mystery.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card elev-sm\" style=\"padding:28px;gap:14px;\">\n        <div style=\"width:44px;height:44px;border-radius:50%;background:var(--color-accent-100);display:flex;align-items:center;justify-content:center;\">\n          <span style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-accent-700);\">03<\u002Fspan>\n        <\u002Fdiv>\n        <h3 class=\"card-title\" style=\"font-size:20px;\">Concierge<\u002Fh3>\n        <p class=\"card-body\">Direct partnerships with high-rise condos, apartment complexes and their front desks, so pickup and delivery fit into a building you already live in.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS -->\n  <section id=\"how-it-works\" style=\"background:var(--color-surface);padding:88px 32px;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <h6 style=\"color:var(--color-accent-700);\">How it works<\u002Fh6>\n      <h2 style=\"font-size:34px;margin:10px 0 40px;\">From your closet to ours, and back again on demand.<\u002Fh2>\n      <div class=\"mw-steps-grid\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <span style=\"font-family:var(--font-heading);font-size:28px;color:var(--color-accent);\">01<\u002Fspan>\n          <h4 style=\"font-size:17px;\">Schedule a pickup<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">Tell us what's coming over. We arrive with garment bags in hand.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <span style=\"font-family:var(--font-heading);font-size:28px;color:var(--color-accent);\">02<\u002Fspan>\n          <h4 style=\"font-size:17px;\">White-glove intake<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">Every item is inspected, pressed, and photographed on a green screen.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <span style=\"font-family:var(--font-heading);font-size:28px;color:var(--color-accent);\">03<\u002Fspan>\n          <h4 style=\"font-size:17px;\">Catalogued &amp; stored<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">It's tagged, shelved in climate control, and added to your digital closet.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <span style=\"font-family:var(--font-heading);font-size:28px;color:var(--color-accent);\">04<\u002Fspan>\n          <h4 style=\"font-size:17px;\">Delivered on demand<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">Queue what you need, schedule a window, and it shows up ready to wear.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TRUST / PHOTOGRAPHY -->\n  <section style=\"max-width:1240px;margin:0 auto;padding:88px 32px;\">\n    <div class=\"mw-grid-2\">\n      <div style=\"position:relative;width:100%;height:420px;border-radius:var(--radius-lg);overflow:hidden;order:2;\">\n          <img src=\"87566658-f633-4b51-a2fe-303c4634abae\" alt=\"Jackets hanging on a clothes rack\" class=\"washed\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n          <span style=\"position:absolute;bottom:8px;left:10px;font-size:10px;color:rgba(255,255,255,0.85);text-shadow:0 1px 2px rgba(0,0,0,0.5);\">Photo by <a href=\"https://unsplash.com/@amandavickcreative\" style=\"color:inherit;\">Amanda Vick<\u002Fa> on Unsplash<\u002Fspan>\n        <\u002Fdiv>\n      <div style=\"order:1;\">\n        <h6 style=\"color:var(--color-accent-700);\">Transparency, by design<\u002Fh6>\n        <h2 style=\"font-size:30px;margin:10px 0 18px;max-width:16ch;\">See every item the way you'd see it in your own closet.<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:18px;\">\n          <div style=\"display:flex;gap:14px;\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:var(--color-accent);flex:none;margin-top:7px;\"><\u002Fspan>\n            <p style=\"font-size:14px;opacity:0.85;margin:0;\"><strong>Full green-screen photography<\u002Fstrong> — front, back, and a 360° turn for every garment, so it's shown in its best light.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:var(--color-accent);flex:none;margin-top:7px;\"><\u002Fspan>\n            <p style=\"font-size:14px;opacity:0.85;margin:0;\"><strong>Pressed on intake<\u002Fstrong> — clothes arrive photographed as close to the day you bought them as possible.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:var(--color-accent);flex:none;margin-top:7px;\"><\u002Fspan>\n            <p style=\"font-size:14px;opacity:0.85;margin:0;\"><strong>Photo history<\u002Fstrong> — a running record of condition over time, visible to you and to us, with flags if something needs attention.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COVERAGE CHECKER -->\n  <section id=\"coverage\" style=\"background:var(--color-surface);padding:88px 32px;\">\n    <div style=\"max-width:720px;margin:0 auto;text-align:center;\">\n      <h6 style=\"color:var(--color-accent-700);\">Coverage<\u002Fh6>\n      <h2 style=\"font-size:32px;margin:10px 0 12px;\">Is mywear.house available at your address?<\u002Fh2>\n      <p style=\"font-size:15px;opacity:0.8;margin-bottom:28px;\">We're expanding metro by metro, starting with high-rise and dense apartment buildings.<\u002Fp>\n      <form style=\"display:flex;gap:10px;max-width:480px;margin:0 auto 36px;\" onsubmit=\"return false;\">\n        <input class=\"input\" type=\"text\" placeholder=\"Enter your address\" style=\"flex:1;\">\n        <button class=\"btn btn-primary\" style=\"white-space:nowrap;\">Check availability<\u002Fbutton>\n      <\u002Fform>\n      <div style=\"display:flex;justify-content:center;gap:36px;flex-wrap:wrap;\">\n        <div>\n          <div style=\"font-family:var(--font-heading);font-size:22px;color:var(--color-accent);\">Next-day<\u002Fdiv>\n          <div style=\"font-size:13px;opacity:0.7;\">standard delivery window<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-heading);font-size:22px;color:var(--color-accent);\">Metro-wide<\u002Fdiv>\n          <div style=\"font-size:13px;opacity:0.7;\">pickup &amp; delivery coverage<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-heading);font-size:22px;color:var(--color-accent);\">1 year free<\u002Fdiv>\n          <div style=\"font-size:13px;opacity:0.7;\">included with select new apartment leases<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRICING -->\n  <section id=\"pricing\" style=\"max-width:1240px;margin:0 auto;padding:88px 32px;\">\n    <h6 style=\"color:var(--color-accent-700);\">Plans<\u002Fh6>\n    <h2 style=\"font-size:34px;margin:10px 0 40px;max-width:16ch;\">Pay for the closet space you actually need.<\u002Fh2>\n    <div class=\"mw-pricing-grid\">\n      <div class=\"card elev-sm\" style=\"padding:26px;gap:16px;\">\n        <div class=\"card-kicker\">Starter<\u002Fdiv>\n        <div><span style=\"font-family:var(--font-heading);font-size:30px;\">$29<\u002Fspan><span style=\"font-size:13px;opacity:0.7;\">/mo<\u002Fspan><\u002Fdiv>\n        <p class=\"card-body\">Up to 20 items — a seasonal overflow rack.<\u002Fp>\n        <a href=\"#coverage\" class=\"btn btn-secondary btn-block\">Get started<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"card elev-sm\" style=\"padding:26px;gap:16px;\">\n        <div class=\"card-kicker\">Standard<\u002Fdiv>\n        <div><span style=\"font-family:var(--font-heading);font-size:30px;\">$79<\u002Fspan><span style=\"font-size:13px;opacity:0.7;\">/mo<\u002Fspan><\u002Fdiv>\n        <p class=\"card-body\">Up to 75 items — a real second closet.<\u002Fp>\n        <a href=\"#coverage\" class=\"btn btn-secondary btn-block\">Get started<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"card elev-lg\" style=\"padding:26px;gap:16px;background:var(--color-accent-100);\">\n        <div class=\"card-kicker\">Household<\u002Fdiv>\n        <div><span style=\"font-family:var(--font-heading);font-size:30px;\">$149<\u002Fspan><span style=\"font-size:13px;opacity:0.7;\">/mo<\u002Fspan><\u002Fdiv>\n        <p class=\"card-body\">Up to 175 items across every member of the household.<\u002Fp>\n        <a href=\"#coverage\" class=\"btn btn-primary btn-block\">Get started<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"card elev-sm\" style=\"padding:26px;gap:16px;\">\n        <div class=\"card-kicker\">Premium<\u002Fdiv>\n        <div><span style=\"font-family:var(--font-heading);font-size:30px;\">$249<\u002Fspan><span style=\"font-size:13px;opacity:0.7;\">/mo<\u002Fspan><\u002Fdiv>\n        <p class=\"card-body\">Priority delivery and enhanced care for high-value garments.<\u002Fp>\n        <a href=\"#coverage\" class=\"btn btn-secondary btn-block\">Get started<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section id=\"faq\" style=\"background:var(--color-surface);padding:88px 32px;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <h6 style=\"color:var(--color-accent-700);\">FAQ<\u002Fh6>\n      <h2 style=\"font-size:34px;margin:10px 0 40px;max-width:16ch;\">Good to know before your first pickup.<\u002Fh2>\n      <div class=\"mw-faq-grid\">\n        <div>\n          <h4 style=\"font-size:16px;\">What happens to my clothes when they're picked up?<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">Every item is inspected, pressed, photographed front, back and 360°, tagged, and placed in climate-controlled storage before it ever appears in your closet.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <h4 style=\"font-size:16px;\">Can my whole household share an account?<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">Yes — a household account splits into individual member closets, so everyone browses and queues their own items under one plan.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <h4 style=\"font-size:16px;\">What if something comes back stained or damaged?<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">Our system flags condition changes automatically and suggests a cleaning or repair option before the item is ever delivered.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <h4 style=\"font-size:16px;\">Is there a minimum commitment?<\u002Fh4>\n          <p style=\"font-size:14px;opacity:0.75;\">No — plans are month to month, and you can resize your storage or cancel delivery windows any time from your account.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT CTA -->\n  <section style=\"max-width:1240px;margin:0 auto;padding:80px 32px;\">\n    <div class=\"card elev-md\" style=\"background:var(--color-accent);color:var(--color-bg);padding:48px;flex-direction:row;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px;border-radius:calc(var(--radius-lg) * 1.15);\">\n      <div>\n        <h2 style=\"font-size:28px;margin-bottom:8px;\">Ready to get your closet back?<\u002Fh2>\n        <p style=\"opacity:0.9;font-size:15px;\">Talk to a specialist about setting up your account.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"#coverage\" class=\"btn\" style=\"background:var(--color-bg);color:var(--color-accent-800);padding:14px 26px;font-size:15px;\">Contact sales<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:48px 32px 32px;\">\n    <div style=\"max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:24px;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <div style=\"width:30px;height:30px;border-radius:50%;background:var(--color-accent);display:flex;align-items:center;justify-content:center;flex:none;\">\n          <span style=\"font-family:var(--font-heading);font-size:13px;color:var(--color-bg);\">m<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:var(--font-heading);font-size:16px;\">mywear<span style=\"color:var(--color-accent);\">.house<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:48px;flex-wrap:wrap;\">\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <h6 style=\"opacity:0.6;\">Company<\u002Fh6>\n          <a href=\"#services\" style=\"font-size:13px;color:var(--color-text);\">Services<\u002Fa>\n          <a href=\"#how-it-works\" style=\"font-size:13px;color:var(--color-text);\">How it works<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <h6 style=\"opacity:0.6;\">Plans<\u002Fh6>\n          <a href=\"#pricing\" style=\"font-size:13px;color:var(--color-text);\">Pricing<\u002Fa>\n          <a href=\"#coverage\" style=\"font-size:13px;color:var(--color-text);\">Coverage<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <h6 style=\"opacity:0.6;\">Support<\u002Fh6>\n          <a href=\"#faq\" style=\"font-size:13px;color:var(--color-text);\">FAQ<\u002Fa>\n          <a href=\"#\" style=\"font-size:13px;color:var(--color-text);\">Contact<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hr\" style=\"max-width:1240px;margin-left:auto;margin-right:auto;\"><\u002Fdiv>\n    <p style=\"max-width:1240px;margin:0 auto;font-size:12px;opacity:0.55;\">© 2026 mywear.house. A managed digital wardrobe storage company.<\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {};\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
