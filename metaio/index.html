<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
    <meta name="studio:project" content="Metaio">
    <meta name="studio:description" content="Metaio and WIHP Ads budget alert email production previews.">
    <title>Metaio — Thom Griggs Studio</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ee;
        --ink: #171717;
        --muted: #66615b;
        --line: #d8d0c5;
        --card: #fffaf3;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      .back {
        color: var(--muted);
        font-size: 14px;
        text-decoration: none;
      }

      .eyebrow {
        margin: 48px 0 12px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(42px, 8vw, 76px);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      .intro {
        max-width: 620px;
        margin: 0 0 42px;
        color: var(--muted);
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }

      .card {
        display: block;
        min-height: 145px;
        padding: 22px;
        background: var(--card);
        border: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
      }

      .card:hover { border-color: var(--ink); }

      .card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 21px;
        line-height: 1.15;
      }

      .card span { color: var(--muted); }
    </style>
  </head>
  <body>
    <main>
      <a class="back" href="/">← Studio index</a>
      <p class="eyebrow">Metaio · Email Production</p>
      <h1>Email previews</h1>
      <p class="intro">Budget alert email production previews for Metaio and WIHP Ads campaign workflows.</p>

      <div class="grid" aria-label="Metaio email previews">
        <a class="card" href="/metaio/emails/">
          <strong>Budget alert emails</strong>
          <span>Rendered HTML email archive with Metaio and WIHP Ads variants.</span>
        </a>
      </div>
    </main>
  </body>
</html>
